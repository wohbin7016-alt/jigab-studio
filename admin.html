<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>지갑스튜디오 어드민</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-4xl mx-auto p-4">
  <header class="mb-6 mt-4">
    <h1 class="text-2xl font-bold text-[#E65100]">🔐 지갑스튜디오 어드민</h1>
    <p class="text-sm text-gray-500 mt-1">라이선스 발급·관리</p>
  </header>

  <!-- 로그인 섹션 -->
  <div id="loginSection" class="bg-white rounded-2xl shadow p-6 mb-6">
    <label class="text-sm font-bold text-gray-700">어드민 비밀번호</label>
    <input id="adminPw" type="password" placeholder="비밀번호 입력"
      class="w-full mt-2 h-[44px] px-3 rounded-lg border-2 border-gray-200 focus:border-[#E65100] outline-none">
    <button id="loginBtn" class="w-full mt-3 h-[44px] rounded-lg bg-[#E65100] text-white font-bold">로그인</button>
  </div>

  <!-- 메인 섹션 -->
  <div id="mainSection" class="hidden">
    <!-- 새 라이선스 발급 -->
    <div class="bg-white rounded-2xl shadow p-6 mb-4">
      <h2 class="text-lg font-bold mb-3">➕ 새 라이선스 발급</h2>
      <div class="grid grid-cols-2 gap-3">
        <input id="buyerName" placeholder="구매자 이름 (예: 홍길동)" class="h-[40px] px-3 rounded-lg border-2 border-gray-200">
        <input id="buyerPhone" placeholder="전화번호 뒷자리 (예: 1234)" class="h-[40px] px-3 rounded-lg border-2 border-gray-200">
      </div>
      <input id="issueNote" placeholder="메모 (예: 당근 판매 2026-04-20)" class="w-full mt-2 h-[40px] px-3 rounded-lg border-2 border-gray-200">
      <button id="issueBtn" class="w-full mt-3 h-[44px] rounded-lg bg-[#E65100] text-white font-bold">라이선스 발급</button>

      <div id="issueResult" class="hidden mt-4 p-4 bg-green-50 border-2 border-green-200 rounded-xl">
        <p class="text-sm text-green-700 font-bold">✅ 발급 완료!</p>
        <p class="text-xs text-gray-600 mt-1">이 키를 구매자에게 전달하세요:</p>
        <div class="mt-2 p-3 bg-white border rounded font-mono text-center text-lg font-bold cursor-pointer" id="issuedKey" onclick="navigator.clipboard.writeText(this.innerText); this.innerText += ' (복사됨)'; setTimeout(()=>{this.innerText=this.innerText.replace(' (복사됨)','')},1500)"></div>
        <button onclick="document.getElementById('issueResult').classList.add('hidden')" class="mt-2 text-xs text-gray-500 underline">닫기</button>
      </div>
    </div>

    <!-- 라이선스 목록 -->
    <div class="bg-white rounded-2xl shadow p-6">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-lg font-bold">📋 발급된 라이선스</h2>
        <div class="flex gap-2">
          <button id="exportBtn" class="text-sm px-3 py-1 border rounded-lg bg-blue-50 hover:bg-blue-100">💾 백업 다운로드</button>
          <button id="restoreBtn" class="text-sm px-3 py-1 border rounded-lg bg-amber-50 hover:bg-amber-100">🔄 복원</button>
          <button id="refreshBtn" class="text-sm px-3 py-1 border rounded-lg">새로고침</button>
        </div>
      </div>
      <div id="licenseList" class="space-y-2 text-sm"></div>
    </div>
  </div>
</div>

<script>
const LICENSE_API = 'https://jigab-license.jigab-studio-2026.workers.dev';
let adminPassword = '';

document.getElementById('loginBtn').addEventListener('click', async () => {
  const pw = document.getElementById('adminPw').value;
  if (!pw) return;
  // Test with a list call
  const r = await fetch(LICENSE_API + '/admin/list', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ adminPassword: pw }),
  });
  if (!r.ok) { alert('비밀번호 틀림'); return; }
  adminPassword = pw;
  document.getElementById('loginSection').classList.add('hidden');
  document.getElementById('mainSection').classList.remove('hidden');
  loadLicenses();
});

document.getElementById('issueBtn').addEventListener('click', async () => {
  const buyer = document.getElementById('buyerName').value.trim();
  const phone = document.getElementById('buyerPhone').value.trim();
  const note = document.getElementById('issueNote').value.trim();
  const r = await fetch(LICENSE_API + '/admin/issue', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ adminPassword, buyer, phone, note }),
  });
  const d = await r.json();
  if (d.ok) {
    document.getElementById('issuedKey').innerText = d.key;
    document.getElementById('issueResult').classList.remove('hidden');
    document.getElementById('buyerName').value = '';
    document.getElementById('buyerPhone').value = '';
    document.getElementById('issueNote').value = '';
    loadLicenses();
  } else alert('발급 실패: ' + (d.error || 'unknown'));
});

document.getElementById('refreshBtn').addEventListener('click', loadLicenses);

document.getElementById('exportBtn').addEventListener('click', async () => {
  const r = await fetch(LICENSE_API + '/admin/list', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ adminPassword }),
  });
  const d = await r.json();
  const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0, 10);
  a.download = `jigab_licenses_backup_${date}.json`;
  a.click();
  alert(`✅ 백업 파일 다운로드 완료!\n안전한 곳(Google Drive, Dropbox)에 보관하세요.\n\n다음 주기적 백업 추천: 주 1회`);
});

document.getElementById('restoreBtn').addEventListener('click', async () => {
  if (!confirm('주의: 복원은 현재 라이선스에 추가/덮어쓰기합니다.\n백업 JSON 파일을 선택하세요.')) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    let data;
    try { data = JSON.parse(text); } catch { alert('JSON 파싱 실패'); return; }
    const keys = data.keys || [];
    if (!confirm(`${keys.length}개 라이선스를 복원합니다. 진행?\n(이미 존재하는 키는 덮어쓰지 않고 스킵)`)) return;
    const r = await fetch(LICENSE_API + '/admin/restore', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword, keys }),
    });
    const result = await r.json();
    if (result.ok) {
      alert(`✅ 복원 완료!\n- 새로 복원: ${result.restored}개\n- 이미 있어서 스킵: ${result.skipped}개`);
      loadLicenses();
    } else {
      alert('복원 실패: ' + (result.error || 'unknown'));
    }
  };
  input.click();
});

async function loadLicenses() {
  const r = await fetch(LICENSE_API + '/admin/list', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ adminPassword }),
  });
  const d = await r.json();
  const list = document.getElementById('licenseList');
  const keys = (d.keys || []).sort((a, b) => (b.issued || '').localeCompare(a.issued || ''));
  if (keys.length === 0) { list.innerHTML = '<p class="text-gray-400 text-center py-4">아직 발급된 라이선스가 없습니다.</p>'; return; }
  list.innerHTML = keys.map(k => `
    <div class="border rounded-xl p-3 ${k.revoked ? 'bg-red-50 opacity-60' : 'bg-white'}">
      <div class="flex items-center justify-between gap-2">
        <div class="font-mono text-xs md:text-sm flex-1 truncate" title="${k.key}">${k.key}</div>
        ${k.revoked
          ? '<span class="text-xs bg-red-200 text-red-800 px-2 py-0.5 rounded">차단됨</span>'
          : `<button onclick="revokeKey('${k.key}')" class="text-xs bg-gray-200 px-2 py-0.5 rounded hover:bg-red-200">차단</button>`}
      </div>
      <div class="mt-1 text-xs text-gray-500">
        ${k.buyer || '(이름 없음)'} ${k.phone ? '· ' + k.phone : ''} ${k.note ? '· ' + k.note : ''}
      </div>
      <div class="text-xs text-gray-400 mt-0.5">
        발급: ${(k.issued || '').slice(0, 16).replace('T', ' ')} · 사용 ${k.use_count || 0}회
        ${k.last_used ? ' · 최근: ' + k.last_used.slice(0, 16).replace('T', ' ') : ''}
      </div>
    </div>
  `).join('');
}

async function revokeKey(key) {
  if (!confirm(`이 키를 차단할까요?\n${key}\n차단 후에도 다시 활성화 가능합니다.`)) return;
  const r = await fetch(LICENSE_API + '/admin/revoke', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ adminPassword, key }),
  });
  const d = await r.json();
  if (d.ok) loadLicenses();
  else alert('차단 실패');
}

document.getElementById('adminPw').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
</script>
</body>
</html>
